name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting an improvement!
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
      placeholder: e.g. "When sizing a cluster with mixed GPU types, I have to run the calculator twice and combine results manually"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the calculator does this affect?
      options:
        - Calculation engine
        - Platform support
        - Topology diagram
        - Optics / power breakdown
        - Export / AROC integration
        - UI / usability
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, or anything else that helps explain the request.
